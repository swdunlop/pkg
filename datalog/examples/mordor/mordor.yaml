# jsonfacts config for Mordor "Covenant SMB Copy" lateral movement dataset.
#
# Dataset: OTRF/Security-Datasets covenant_copy_smb_CreateRequest
# Attack: Covenant C2 copies GruntHTTP.exe from WORKSTATION5 to WORKSTATION6 via SMB admin share.
#
# Usage:
#   datalog -c mordor.yaml rules.dl

sources:
  - file: covenant_copy_smb_CreateRequest_2020-09-22145302.json
    mappings:
      # -- Sysmon events (Channel contains "Sysmon") --

      # EventID 3: Network Connection
      - predicate: net_conn
        args:
          - "value.Hostname"
          - "value.Image"
          - "value.SourceIp"
          - "value.SourcePort"
          - "value.DestinationIp"
          - "value.DestinationPort"
          - "value.Protocol"
          - "value.User"
        filter: "value.EventID == 3"

      # EventID 5: Process Terminated
      - predicate: proc_terminate
        args:
          - "value.Hostname"
          - "value.Image"
          - "value.ProcessGuid"
        filter: "value.EventID == 5"

      # EventID 7: Image Loaded
      - predicate: image_load
        args:
          - "value.Hostname"
          - "value.Image"
          - "value.ImageLoaded"
          - "value.Signed"
          - "value.Signature"
        filter: "value.EventID == 7"

      # EventID 10: Process Access
      - predicate: proc_access
        args:
          - "value.Hostname"
          - "value.SourceImage"
          - "value.TargetImage"
          - "value.GrantedAccess"
        filter: "value.EventID == 10"

      # EventID 11: File Create
      - predicate: file_create
        args:
          - "value.Hostname"
          - "value.Image"
          - "value.TargetFilename"
        filter: "value.EventID == 11"

      # EventID 12: Registry Key Create/Delete
      - predicate: reg_key
        args:
          - "value.Hostname"
          - "value.Image"
          - "value.TargetObject"
        filter: "value.EventID == 12"

      # EventID 13: Registry Value Set
      - predicate: reg_value
        args:
          - "value.Hostname"
          - "value.Image"
          - "value.TargetObject"
          - "value.Details"
        filter: "value.EventID == 13"

      # -- Windows Security events --

      # EventID 4624: Logon
      - predicate: logon
        args:
          - "value.Hostname"
          - "value.TargetUserName"
          - "value.TargetDomainName"
          - "value.LogonType"
          - "value.IpAddress"
          - "value.IpPort"
          - "value.AuthenticationPackageName"
        filter: "value.EventID == 4624"

      # EventID 4672: Special Privileges Assigned
      - predicate: special_priv
        args:
          - "value.Hostname"
          - "value.SubjectUserName"
          - "value.SubjectDomainName"
          - "value.PrivilegeList"
        filter: "value.EventID == 4672"

      # EventID 5140: Network Share Access
      - predicate: share_access
        args:
          - "value.Hostname"
          - "value.SubjectUserName"
          - "value.ShareName"
          - "value.IpAddress"
        filter: "value.EventID == 5140"

      # EventID 5145: Detailed Share Access (file-level)
      - predicate: share_file
        args:
          - "value.Hostname"
          - "value.SubjectUserName"
          - "value.ShareName"
          - "value.RelativeTargetName"
          - "value.IpAddress"
          - "value.AccessMask"
        filter: "value.EventID == 5145"

matchers:
  # Flag connections to known SMB port
  - predicate: net_conn
    term: 5
    contains:
      - "445"

  # Flag connections to interesting IPs by subnet
  - predicate: net_conn
    term: 4
    cidr:
      - "172.18.39.0/24"
      - "172.18.38.0/24"

  # Flag executable file paths written via shares
  - predicate: share_file
    term: 3
    case_insensitive: true
    ends_with:
      - ".exe"
      - ".dll"
      - ".ps1"
      - ".bat"
      - ".cmd"
      - ".vbs"
      - ".js"

  # Flag executable file creates
  - predicate: file_create
    term: 2
    case_insensitive: true
    ends_with:
      - ".exe"
      - ".dll"

declarations:
  - name: net_conn
    use: >-
      A network connection observed by Sysmon (event 3): the process on
      host that connected src_ip:src_port to dst_ip:dst_port.
    terms:
      - {name: host}
      - {name: image, use: the process that made the connection}
      - {name: src_ip}
      - {name: src_port}
      - {name: dst_ip}
      - {name: dst_port}
      - {name: protocol, use: 'transport protocol, e.g. "tcp"'}
      - {name: user, use: the account the connecting process ran as}

  - name: proc_terminate
    use: >-
      A process exit observed by Sysmon (event 5).
    terms:
      - {name: host}
      - {name: image, use: the process that exited}
      - {name: guid, use: Sysmon's process GUID}

  - name: image_load
    use: >-
      A module loaded into a process, observed by Sysmon (event 7),
      with its code-signing status.
    terms:
      - {name: host}
      - {name: image, use: the process that loaded the module}
      - {name: loaded, use: path of the loaded module}
      - {name: signed, use: '"true" when the module is code-signed'}
      - {name: signature, use: signer name when signed}

  - name: proc_access
    use: >-
      One process opened a handle to another, observed by Sysmon
      (event 10) -- the shape credential dumping and injection take.
    terms:
      - {name: host}
      - {name: source, use: the process that opened the handle}
      - {name: target, use: the process the handle points at}
      - {name: access, use: 'requested access mask, e.g. "0x1000"'}

  - name: file_create
    use: >-
      A file created on disk, observed by Sysmon (event 11).
    terms:
      - {name: host}
      - {name: image, use: the process that created the file}
      - {name: path, use: filesystem path of the new file}

  - name: reg_key
    use: >-
      A registry key created or deleted, observed by Sysmon (event 12).
    terms:
      - {name: host}
      - {name: image, use: the process that touched the key}
      - {name: key}

  - name: reg_value
    use: >-
      A registry value set, observed by Sysmon (event 13).
    terms:
      - {name: host}
      - {name: image, use: the process that set the value}
      - {name: key}
      - {name: value}

  - name: logon
    use: >-
      A Windows authentication event (Security 4624): user logged on to
      host. type is the numeric logon type -- "2" interactive at the
      console, "3" network, "10" remote interactive (RDP).
    terms:
      - {name: host}
      - {name: user}
      - {name: domain}
      - {name: type, use: 'Windows logon type: "2" console, "3" network, "10" RDP'}
      - {name: ip, use: source address for network logons}
      - {name: port, use: source port for network logons}
      - {name: auth, use: 'authentication package, e.g. "Kerberos" or "NTLM"'}

  - name: special_priv
    use: >-
      Special privileges were assigned at logon (Security 4672) --
      SeDebugPrivilege and friends; an administrative or
      service-level session.
    terms:
      - {name: host}
      - {name: user}
      - {name: domain}
      - {name: privileges, use: the privilege list granted at logon}

  - name: share_access
    use: >-
      A network share object was accessed (Security 5140): user reached
      share on host from ip.
    terms:
      - {name: host}
      - {name: user}
      - {name: share, use: 'UNC share name, e.g. "\\*\C$"'}
      - {name: ip, use: the client address that mounted the share}

  - name: share_file
    use: >-
      A file within a network share was accessed (Security 5145):
      user touched path under share on host from ip.
    terms:
      - {name: host}
      - {name: user}
      - {name: share, use: UNC share name the file lives under}
      - {name: path, use: file path relative to the share root}
      - {name: ip, use: the client address behind the access}
      - {name: access_mask, use: 'requested access mask, e.g. "0x17019f"'}
